name: Build Android App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Cordova and Ionic/Capacitor
      run: |
        npm install -g @capacitor/cli
        npm install @capacitor/core @capacitor/android

    - name: Initialize Capacitor Project
      run: |
        npx cap init BaseConvert com.brayan.baseconvert --web-dir=. --bundled-web-runtime=false

    - name: Add Android Platform
      run: |
        npx cap add android

    - name: Setup Java JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Sync Web Code to Android
      run: |
        npx cap sync android

    - name: Build App (Generate APK)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v3
      with:
        name: meu-aplicativo-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
